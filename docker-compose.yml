version: '3.8'

services:

  backend:
    image: aqib1227/moonlight-backend:1.1
    container_name: moonlight-backend
    ports:
      - "8081:8080"
    restart: always

  frontend:
    image: aqib1227/moonlight-frontend:1.0
    container_name: moonlight-frontend
    ports:
      - "3001:3000"
    restart: always
    depends_on:
      - backend